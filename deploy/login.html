<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ログイン - バナスコAI</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <meta name="description" content="バナスコAIにログインしてAI分析を開始">
</head>
<body class="login-page">
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="/">
                    <h1>🎯 バナスコAI</h1>
                </a>
            </div>
            <nav class="nav">
                <a href="/" class="nav-link">ホーム</a>
            </nav>
        </div>
    </header>

    <!-- Login Section -->
    <section class="login-section">
        <div class="login-container">
            <div class="login-form-wrapper">
                <div class="login-header">
                    <h2>ログイン</h2>
                    <p>バナスコAIでAI分析を開始しましょう</p>
                </div>

                <!-- Error Message -->
                <div id="errorMessage" class="error-message" style="display: none;">
                    <i class="fas fa-exclamation-triangle"></i>
                    <span id="errorText"></span>
                </div>

                <!-- Success Message -->
                <div id="successMessage" class="success-message" style="display: none;">
                    <i class="fas fa-check-circle"></i>
                    <span id="successText"></span>
                </div>

                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="email">
                            <i class="fas fa-envelope"></i>
                            メールアドレス
                        </label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            required 
                            placeholder="example@email.com"
                            autocomplete="email"
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">
                            <i class="fas fa-lock"></i>
                            パスワード
                        </label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            required 
                            placeholder="パスワードを入力"
                            autocomplete="current-password"
                        >
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe" name="rememberMe">
                            <span class="checkmark"></span>
                            ログイン状態を保持
                        </label>
                        <a href="#" class="forgot-password">パスワードを忘れた方</a>
                    </div>

                    <button type="submit" class="btn btn-primary btn-login" id="loginButton">
                        <span class="button-text">ログイン</span>
                        <div class="spinner" style="display: none;">
                            <i class="fas fa-spinner fa-spin"></i>
                        </div>
                    </button>
                </form>

                <div class="login-divider">
                    <span>または</span>
                </div>

                <div class="social-login">
                    <button class="btn btn-google" id="googleLoginBtn">
                        <i class="fab fa-google"></i>
                        Googleでログイン
                    </button>
                </div>

                <div class="signup-link">
                    <p>アカウントをお持ちでない方は <a href="#" id="signupLink">新規登録</a></p>
                    <p><strong>テスト用:</strong> <button class="btn btn-info" id="createDemoBtn" style="margin-top: 10px;">デモアカウント作成</button></p>
                </div>
            </div>

            <div class="login-info">
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-shield-alt"></i>
                    </div>
                    <h3>セキュアな認証</h3>
                    <p>Firebase認証システムで安全にログイン</p>
                </div>
                <div class="info-card">
                    <div class="info-icon">
                        <i class="fas fa-rocket"></i>
                    </div>
                    <h3>即座に開始</h3>
                    <p>ログイン後すぐにAI分析を体験できます</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Scripts -->
    <script type="module" src="/static/js/auth.js"></script>
    <script type="module" src="/static/app.js"></script>
    
    <script>
        // Initialize login page
        document.addEventListener('DOMContentLoaded', function() {
            // Set focus to email field
            document.getElementById('email').focus();
            
            // Handle signup link - Show registration modal
            document.getElementById('signupLink').addEventListener('click', function(e) {
                e.preventDefault();
                showRegistrationModal();
            });
            
            // Handle demo account creation
            document.getElementById('createDemoBtn').addEventListener('click', async function(e) {
                e.preventDefault();
                
                try {
                    const { register } = await import('/static/js/auth.js');
                    
                    // デモアカウントを作成
                    await register('demo@banasuko.com', 'demo123456');
                    alert('デモアカウントが作成されました！\nメール: demo@banasuko.com\nパスワード: demo123456');
                    
                    // フォームにデモ情報を設定
                    document.getElementById('email').value = 'demo@banasuko.com';
                    document.getElementById('password').value = 'demo123456';
                    
                } catch (error) {
                    if (error.code === 'auth/email-already-in-use') {
                        alert('デモアカウントは既に存在します！\nメール: demo@banasuko.com\nパスワード: demo123456\n\n上記でログインしてください。');
                        
                        // フォームにデモ情報を設定
                        document.getElementById('email').value = 'demo@banasuko.com';
                        document.getElementById('password').value = 'demo123456';
                    } else {
                        alert('エラー: ' + error.message);
                    }
                }
            });
        });

        // Registration Modal Functions
        function showRegistrationModal() {
            // Create modal HTML
            const modalHTML = `
                <div id="registrationModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50" style="backdrop-filter: blur(5px);">
                    <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4 shadow-2xl">
                        <div class="flex justify-between items-center mb-6">
                            <h2 class="text-2xl font-bold text-gray-800">新規登録</h2>
                            <button onclick="closeRegistrationModal()" class="text-gray-500 hover:text-gray-700 text-xl">&times;</button>
                        </div>
                        <form id="registrationForm">
                            <div class="mb-4">
                                <label for="regEmail" class="block text-gray-700 text-sm font-bold mb-2">メールアドレス</label>
                                <input type="email" id="regEmail" name="email" required 
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                                       placeholder="example@email.com">
                            </div>
                            <div class="mb-4">
                                <label for="regUsername" class="block text-gray-700 text-sm font-bold mb-2">ユーザー名</label>
                                <input type="text" id="regUsername" name="username" required 
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                                       placeholder="ユーザー名（2文字以上）">
                            </div>
                            <div class="mb-6">
                                <label for="regPassword" class="block text-gray-700 text-sm font-bold mb-2">パスワード</label>
                                <input type="password" id="regPassword" name="password" required 
                                       class="w-full px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:border-blue-500"
                                       placeholder="6文字以上">
                            </div>
                            <div id="regErrorMessage" class="mb-4 p-3 bg-red-100 border border-red-300 text-red-700 rounded hidden"></div>
                            <div id="regSuccessMessage" class="mb-4 p-3 bg-green-100 border border-green-300 text-green-700 rounded hidden"></div>
                            <button type="submit" id="regSubmitBtn" 
                                    class="w-full bg-blue-500 text-white py-2 px-4 rounded-lg hover:bg-blue-600 transition-colors">
                                アカウント作成
                            </button>
                        </form>
                    </div>
                </div>
            `;
            
            // Add modal to page
            document.body.insertAdjacentHTML('beforeend', modalHTML);
            
            // Add event listener
            document.getElementById('registrationForm').addEventListener('submit', handleRegistration);
        }

        function closeRegistrationModal() {
            const modal = document.getElementById('registrationModal');
            if (modal) {
                modal.remove();
            }
        }

        async function handleRegistration(e) {
            e.preventDefault();
            
            const email = document.getElementById('regEmail').value.trim();
            const username = document.getElementById('regUsername').value.trim();
            const password = document.getElementById('regPassword').value;
            
            const errorDiv = document.getElementById('regErrorMessage');
            const successDiv = document.getElementById('regSuccessMessage');
            const submitBtn = document.getElementById('regSubmitBtn');
            
            // Clear previous messages
            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            
            // Basic validation
            if (!email || !username || !password) {
                errorDiv.textContent = 'すべての項目を入力してください';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (password.length < 6) {
                errorDiv.textContent = 'パスワードは6文字以上で入力してください';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            if (username.length < 2) {
                errorDiv.textContent = 'ユーザー名は2文字以上で入力してください';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            // Disable submit button
            submitBtn.disabled = true;
            submitBtn.textContent = '作成中...';
            
            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        email: email,
                        password: password,
                        username: username,
                        displayName: username
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    successDiv.textContent = 'アカウントが作成されました！ログインページにリダイレクトします...';
                    successDiv.classList.remove('hidden');
                    
                    setTimeout(() => {
                        // Auto-fill login form and close modal
                        document.getElementById('email').value = email;
                        document.getElementById('password').value = password;
                        closeRegistrationModal();
                        
                        // Show success message on main page
                        alert('アカウント作成完了！\\n作成されたアカウント情報がログインフォームに入力されました。\\n「ログイン」ボタンをクリックしてください。');
                    }, 1500);
                } else {
                    errorDiv.textContent = data.error || 'アカウント作成に失敗しました';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorDiv.textContent = 'ネットワークエラーが発生しました';
                errorDiv.classList.remove('hidden');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'アカウント作成';
            }
        }

        // Make functions global
        window.showRegistrationModal = showRegistrationModal;
        window.closeRegistrationModal = closeRegistrationModal;
        });
    </script>
</body>
</html>
